<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2> ES6 array map()

    </h2>
    <div id="demo"></div>
   
<script>
    
const num = [1,2,3,4];
const num2 = num.map(x => x * 2);
document.getElementById('demo').innerHTML = num2;
</script>
</body>

</html>
