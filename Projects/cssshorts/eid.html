<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eid Mubarak</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ffd700;
        }

        #message {
            margin-top: 20px;
            font-size: 22px;
            color: #ffd700;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Eid Mubarak 🌙</h1>
        <p>May Allah bless you with happiness, peace and prosperity</p>
        <button onclick="showMessage()">Click for Surprise</button>
        <h2 id="message"></h2>
    </div>

    <script>
        function showMessage(){
            document.getElementById("message").innerText =
            "✨ Stay Blessed & Keep Smiling ✨";
        }
    </script>

</body>
</html>
