<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <link rel="stylesheet" href="../style/password.css" />
</head>

<body class="secure-page">

  <!-- Navbar -->
  <header>
    <div class="container nav-container">
      <div class="logo">MyWebsite</div>
      <nav>
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/signup">Sign up</a>
        <a href="/login">Login</a>
        <a href="/password">Change Password</a>
        <a href="/delete">Delete Email</a>
      </nav>
    </div>
  </header>

  <!-- Change Password Section -->
  <section class="auth-section">
    <div class="secure-card">
      <h1>🔐 Change Your Password</h1>
      <p class="subtitle">Keep your account secure</p>

      <form id="changeForm">
        <input type="text" placeholder="Email Address" id="email" />
        <input type="password" placeholder="Old Password" id="password" />
        <input type="password" placeholder="New Password" id="newPassword" />
        <button type="submit">Update Password</button>
      </form>
    </div>
  </section>

  <script>
    const emailTag = document.getElementById("email");
    const passTag = document.getElementById("password");
    const newPassTag = document.getElementById("newPassword");
    const form = document.getElementById("changeForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!emailTag.value || !passTag.value || !newPassTag.value) {
        return alert("All fields are required");
      }

      const user = {
        email: emailTag.value,
        oldPassword: passTag.value,
        newPassword: newPassTag.value
      };

      try {
        const res = await fetch("/changePassword", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
        });

        const data = await res.json();
        alert(data.message);

        emailTag.value = "";
        passTag.value = "";
        newPassTag.value = "";

      } catch (err) {
        console.log(err);
      }
    });
  </script>

</body>
</html>
